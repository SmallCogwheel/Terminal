<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>terminal</title>
    <link rel="stylesheet" href="terminal.css">
</head>
<body>

<div class="terminal_window">
    <div class="terminal_bar">
        <span class="dot dot_r"></span>
        <span class="dot dot_y"></span>
        <span class="dot dot_g"></span>
        <span class="terminal_title">~ SmallCogwheel — portfolio</span>
    </div>

    <div class="terminal_body" id="output">
        <div class="t_info">SmallCogwheel Portfolio Terminal v1.0</div>
        <div class="t_out">──────────────────────────────────</div>
        <div class="t_out">'help' 를 입력하면 명령어 목록이 나와요.</div>
        <div class="t_line" style="color:#333">　</div>
    </div>

    <div class="input_line">
        <span class="t_prompt">❯&nbsp;</span>
        <input id="cmd_input" type="text" autofocus autocomplete="off" spellcheck="false" placeholder="명령어 입력...">
    </div>
</div>

<script src="terminal.js"></script>
</body>
</html>
